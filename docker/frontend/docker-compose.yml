services:
  frontend:
    build:
      context: ../..
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    ports:
      - "${FRONTEND_PORT:-4173}:4173"
    environment:
      PORT: 4173
      ORIGIN: ${ORIGIN:-http://localhost:4173}
